<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Day</title>
<style>
  :root {
    --navy: #0b1f3a;
    --navy-light: #12335e;
    --red: #c8102e;
    --red-dark: #9c0c22;
    --paper: #f4f5f7;
    --grey: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--paper);
    color: var(--navy);
  }
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: white;
    padding: 24px 20px 20px;
    border-bottom: 4px solid var(--red);
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    letter-spacing: 0.3px;
  }
  header p {
    margin: 0;
    font-size: 13px;
    color: #b9c4d8;
  }
  .controls {
    max-width: 720px;
    margin: -22px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .control-card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(11,31,58,0.15);
    padding: 12px 14px;
    flex: 1;
    min-width: 160px;
  }
  .control-card label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--grey);
    margin-bottom: 4px;
  }
  .control-card input,
  .control-card select {
    width: 100%;
    border: none;
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
    outline: none;
    font-family: inherit;
  }
  .day-nav {
    max-width: 720px;
    margin: 14px auto 0;
    padding: 0 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .day-nav button {
    border: none;
    background: white;
    color: var(--navy);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(11,31,58,0.12);
  }
  .day-nav button:hover { background: var(--navy); color: white; }

  .view-tabs {
    max-width: 720px;
    margin: 14px auto 0;
    padding: 0 20px;
    display: flex;
    justify-content: center;
    gap: 8px;
  }
  .view-tabs button {
    border: none;
    background: white;
    color: var(--navy);
    padding: 7px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(11,31,58,0.12);
  }
  .view-tabs button.active {
    background: var(--red);
    color: white;
  }

  .standings-group {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(11,31,58,0.08);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .league-scroller-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin: 0 0 4px;
  }
  .scroller-arrow {
    flex: 0 0 auto;
    border: none;
    background: white;
    color: var(--navy);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(11,31,58,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scroller-arrow:disabled { opacity: 0.3; cursor: default; }
  .league-scroller {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    padding: 2px 4px 12px;
    flex: 1;
    min-width: 0;
  }
  .league-scroller::-webkit-scrollbar { height: 6px; }
  .league-scroller::-webkit-scrollbar-thumb {
    background: #c7cedb;
    border-radius: 3px;
  }
  .round-picker {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 0 0 12px;
  }
  .round-pill {
    border: none;
    background: #e8edf5;
    color: var(--navy);
    padding: 5px 12px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
  }
  .round-pill.active { background: var(--navy); color: white; }
  .standings-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 8px 16px 12px;
    font-size: 11px;
    color: var(--grey);
  }
  .standings-legend .swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 5px;
    vertical-align: -1px;
  }
  .league-pill {
    flex: 0 0 auto;
    scroll-snap-align: start;
    border: none;
    background: white;
    color: var(--navy);
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    white-space: nowrap;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(11,31,58,0.12);
  }
  .league-pill.active {
    background: var(--navy);
    color: white;
  }
  .standings-group h3 {
    margin: 0;
    padding: 12px 16px;
    font-size: 14px;
    background: var(--navy);
    color: white;
  }
  .standings-group .league-name {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--grey);
    padding: 10px 16px 0;
  }
  table.standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.standings-table th,
  table.standings-table td {
    padding: 7px 8px;
    text-align: center;
    white-space: nowrap;
  }
  table.standings-table th {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--grey);
    border-bottom: 2px solid var(--paper);
  }
  table.standings-table td.team-col,
  table.standings-table th.team-col {
    text-align: left;
    white-space: normal;
  }
  table.standings-table td.pos-col { color: var(--grey); font-weight: 600; }
  table.standings-table tr:nth-child(even) { background: #fafbfc; }
  table.standings-table td.diff-positive { color: #0a7a3d; }
  table.standings-table td.diff-negative { color: var(--red-dark); }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
  }
  .selected-date {
    text-align: center;
    font-size: 14px;
    color: var(--grey);
    margin-bottom: 16px;
  }
  .match-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(11,31,58,0.08);
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .match-time {
    width: 56px;
    flex-shrink: 0;
    text-align: center;
    font-weight: 700;
    color: var(--red);
    font-size: 14px;
  }
  .match-time span {
    display: block;
    font-size: 10px;
    color: var(--grey);
    font-weight: 500;
  }
  .match-teams {
    flex: 1;
    min-width: 0;
  }
  .team-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    font-size: 15px;
  }
  .team-row.winner { font-weight: 700; }
  .team-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .team-score { font-weight: 700; color: var(--navy); padding-left: 10px; }
  .match-meta {
    font-size: 12px;
    color: var(--grey);
    margin-top: 6px;
  }
  .league-tag {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    background: var(--navy);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 4px;
  }
  .empty-state {
    text-align: center;
    color: var(--grey);
    padding: 40px 20px;
    font-size: 14px;
  }
  .status-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .status-upcoming { background: #e8edf5; color: var(--navy); }
  .status-final { background: #fdeceb; color: var(--red-dark); }
  .status-live {
    background: var(--red);
    color: white;
    animation: live-pulse 1.6s ease-in-out infinite;
  }
  @keyframes live-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .match-time.is-live { color: var(--red); }

  table.standings-table th.sortable {
    cursor: pointer;
    user-select: none;
  }
  table.standings-table th.sortable:hover { color: var(--navy); }
  table.standings-table td.total-att-clickable {
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    color: var(--navy);
    font-weight: 700;
  }
  table.standings-table tr.attendance-total-row {
    border-top: 2px solid var(--navy);
    background: #eef1f7 !important;
  }
  table.standings-table tr.attendance-total-row td { font-weight: 700; }
  table.standings-table td.dash-cell { color: var(--grey); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(11,31,58,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 1000;
  }
  .modal-box {
    background: white;
    border-radius: 12px;
    max-width: 420px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--paper);
    position: sticky;
    top: 0;
    background: white;
    border-radius: 12px 12px 0 0;
  }
  .modal-header h3 { margin: 0; font-size: 15px; color: var(--navy); }
  #modal-close-btn {
    border: none;
    background: none;
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    color: var(--grey);
    padding: 0 4px;
  }
  .modal-body { padding: 6px 16px 16px; font-size: 13px; }
  .modal-game-row {
    padding: 7px 0;
    border-bottom: 1px solid #f0f2f5;
    display: flex;
    justify-content: space-between;
    gap: 10px;
  }
  .modal-game-row:last-child { border-bottom: none; }
  .modal-game-row .att-figure { font-weight: 700; color: var(--navy); flex-shrink: 0; }
  .modal-game-row .game-main { flex: 1; min-width: 0; }
  .modal-game-row .game-venue { font-size: 11px; color: var(--grey); margin-top: 2px; }
</style>
</head>
<body>

<header>
  <h1>Match Day</h1>
  <p id="update-note">Loading fixtures…</p>
  <nav style="margin-top:10px;font-size:12px;">
    <a href="matches.html" style="color:white;background:rgba(255,255,255,0.15);text-decoration:none;padding:4px 10px;border-radius:12px;">Fixtures</a>
    <a href="standings.html" style="color:#b9c4d8;text-decoration:none;padding:4px 10px;border-radius:12px;">Standings</a>
  </nav>
</header>

<div class="controls" id="controls-bar">
  <div class="control-card">
    <label for="date-input">Date</label>
    <input type="date" id="date-input">
  </div>
  <div class="control-card">
    <label for="league-select">League</label>
    <select id="league-select">
      <option value="all">All leagues</option>
    </select>
  </div>
</div>

<div class="view-tabs">
  <button id="view-fixtures-btn" class="active">Fixtures</button>
  <button id="view-standings-btn">Standings</button>
  <button id="view-attendance-btn">Attendance</button>
</div>

<div class="day-nav" id="day-nav">
  <button id="prev-day">&larr; Prev</button>
  <button id="today-btn">Today</button>
  <button id="next-day">Next &rarr;</button>
</div>

<main>
  <div class="selected-date" id="selected-date-label"></div>
  <div id="match-list"></div>
  <div id="standings-view" style="display:none;"></div>
  <div id="attendance-view" style="display:none;"></div>
</main>

<div id="game-modal-overlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button id="modal-close-btn" aria-label="Close">&times;</button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<script>
let allMatches = [];
let leagues = {};
let standings = {}; // { leagueKey: { groupLabel: [ {team, played, win, draw, loss, for, against, diff, points}, ... ] } }
let attendanceTables = {}; // { leagueKey: [ {team, games, total, average}, ... ] } - official scraped tables (currently just NRL)
let currentView = 'fixtures'; // 'fixtures' | 'standings' | 'attendance'
let standingsLeagueKey = null; // which league's pill is active in the Standings view
let attendanceLeagueKey = null; // which league's pill is active in the Attendance view

const dateInput = document.getElementById('date-input');
const leagueSelect = document.getElementById('league-select');
const matchList = document.getElementById('match-list');
const standingsView = document.getElementById('standings-view');
const attendanceView = document.getElementById('attendance-view');
const dayNav = document.getElementById('day-nav');
const controlsBar = document.getElementById('controls-bar');
const selectedDateLabel = document.getElementById('selected-date-label');
const updateNote = document.getElementById('update-note');
const viewFixturesBtn = document.getElementById('view-fixtures-btn');
const viewStandingsBtn = document.getElementById('view-standings-btn');
const viewAttendanceBtn = document.getElementById('view-attendance-btn');
const gameModalOverlay = document.getElementById('game-modal-overlay');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');

// AFLE/EFA source pages list the away team first / on top and the home team
// second / on the bottom (the opposite of every other league here, whose
// pages list home first) - see fetch_fixtures.py's "swap_home_away" comment.
// m.home/m.away are already stored with the correct real-world attribution
// (fetch_fixtures.py fixes that at parse time), so this is purely a display
// convention: for these leagues, show the away team's row above the
// home team's row (scores stay attached to their own team, only the on-
// screen order flips) to match how fans are used to seeing these boxscores.
// CFL is included here too - its own team-season source pages (see
// parse_cfl_schedule) are read from the home team's page, but CFL fans are
// used to seeing the visiting team listed first on the scoreboard.
const AWAY_FIRST_LEAGUES = new Set(['afle-2026', 'efa-2026', 'cfl-2026']);

function closeGameModal() {
  gameModalOverlay.style.display = 'none';
}
document.getElementById('modal-close-btn').addEventListener('click', closeGameModal);
gameModalOverlay.addEventListener('click', (e) => {
  if (e.target === gameModalOverlay) closeGameModal();
});

// '2026-07-04' -> '7/4/26'
function formatShortDate(iso) {
  if (!iso) return 'TBC';
  const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso);
  if (!m) return iso;
  const [, y, mo, d] = m;
  return `${Number(mo)}/${Number(d)}/${y.slice(2)}`;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// Popup listing every home game a team has played in a league, in the
// format "M/D/YY vs Opponent: attendance" (or "-" when no attendance figure
// is on record for that game yet).
function showTeamGamesModal(leagueKey, team) {
  const games = allMatches
    .filter(m => m.league === leagueKey && normalizeTeamName(m.home) === team)
    .filter(m => !isNeutralVenue(m.venue) && !isExcludedHomeMatch(m))
    .slice()
    .sort((a, b) => (a.date || '9999-99-99').localeCompare(b.date || '9999-99-99'));

  modalTitle.textContent = team;

  if (!games.length) {
    modalBody.innerHTML = '<div class="empty-state">No home games recorded yet.</div>';
  } else {
    modalBody.innerHTML = games.map(m => {
      const attNum = Number(m.attendance);
      const att = (m.attendance !== null && m.attendance !== undefined && m.attendance !== '' && !Number.isNaN(attNum))
        ? attNum.toLocaleString()
        : '-';
      // Venue string already carries city/country where the source page
      // gives it (see fetch_fixtures.py's per-parser venue building), so
      // showing it as-is covers "venue, city, country (if available)".
      const venueLine = m.venue ? `<div class="game-venue">${escapeHtml(m.venue)}</div>` : '';
      return `<div class="modal-game-row">
        <div class="game-main">
          <div>${formatShortDate(m.date)} vs ${escapeHtml(m.away)}</div>
          ${venueLine}
        </div>
        <span class="att-figure">${att}</span>
      </div>`;
    }).join('');
  }

  gameModalOverlay.style.display = 'flex';
}

function toISODate(d) {
  return d.toISOString().slice(0, 10);
}

function shiftDate(days) {
  const current = new Date(dateInput.value + 'T00:00:00');
  current.setDate(current.getDate() + days);
  dateInput.value = toISODate(current);
  render();
}

document.getElementById('prev-day').addEventListener('click', () => shiftDate(-1));
document.getElementById('next-day').addEventListener('click', () => shiftDate(1));
document.getElementById('today-btn').addEventListener('click', () => {
  dateInput.value = toISODate(new Date());
  render();
});
dateInput.addEventListener('change', render);
leagueSelect.addEventListener('change', render);

function setView(view) {
  currentView = view;
  const showFixtures = view === 'fixtures';
  viewFixturesBtn.classList.toggle('active', view === 'fixtures');
  viewStandingsBtn.classList.toggle('active', view === 'standings');
  viewAttendanceBtn.classList.toggle('active', view === 'attendance');
  dayNav.style.display = showFixtures ? 'flex' : 'none';
  controlsBar.style.display = showFixtures ? 'flex' : 'none';
  selectedDateLabel.style.display = showFixtures ? '' : 'none';
  matchList.style.display = showFixtures ? '' : 'none';
  standingsView.style.display = view === 'standings' ? '' : 'none';
  attendanceView.style.display = view === 'attendance' ? '' : 'none';
  render();
}

viewFixturesBtn.addEventListener('click', () => setView('fixtures'));
viewStandingsBtn.addEventListener('click', () => setView('standings'));
viewAttendanceBtn.addEventListener('click', () => setView('attendance'));

function enrichMatch(m) {
  // Prefer the true UTC instant (converted to whatever timezone this
  // browser is in) over the raw venue-local date/time that came straight
  // off the Wikipedia page. Falls back to the venue-local values (and
  // flags them as such) when we don't have enough info to compute UTC -
  // e.g. the kickoff time wasn't parseable, or the league has no known
  // UTC offset for that venue.
  if (m.utc) {
    const d = new Date(m.utc);
    m._localDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    m._localTime = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    m._timeIsLocal = true;
  } else {
    m._localDate = m.date;
    m._localTime = m.time;
    m._timeIsLocal = false;
  }
  return m;
}

// How long after kickoff a match is still considered "live" for display
// purposes. This is just a display heuristic - fixtures.json doesn't carry
// a real live/final signal (Wikipedia only gives us date/time/score), so a
// match still shows LIVE for up to this long after its scheduled kickoff
// even if it actually finished early, and flips to FT/upcoming outside
// this window based on whether a score has been parsed.
const LIVE_WINDOW_MS = 2 * 60 * 60 * 1000; // 2 hours

function getMatchStatus(m, now) {
  // No usable kickoff instant - fall back to score-only logic (old behavior)
  if (!m.utc) {
    return (m.score !== null && m.score !== undefined) ? 'final' : 'upcoming';
  }
  const start = new Date(m.utc);
  const elapsed = now - start;
  if (elapsed < 0) return 'upcoming';
  if (elapsed <= LIVE_WINDOW_MS) return 'live';
  return (m.score !== null && m.score !== undefined) ? 'final' : 'upcoming';
}

function formatDateLabel(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function render() {
  if (currentView === 'standings') {
    renderStandings();
    return;
  }
  if (currentView === 'attendance') {
    renderAttendance();
    return;
  }

  const selectedDate = dateInput.value;
  const selectedLeague = leagueSelect.value;

  selectedDateLabel.textContent = selectedDate ? formatDateLabel(selectedDate) : '';

  const dayMatches = allMatches
    .filter(m => m._localDate === selectedDate)
    .filter(m => selectedLeague === 'all' || m.league === selectedLeague)
    .sort((a, b) => (a._localTime || '99:99').localeCompare(b._localTime || '99:99'));

  matchList.innerHTML = '';

  if (dayMatches.length === 0) {
    matchList.innerHTML = '<div class="empty-state">No matches scheduled for this day.</div>';
    return;
  }

  const now = new Date();

  for (const m of dayMatches) {
    const card = document.createElement('div');
    card.className = 'match-card';

    const status = getMatchStatus(m, now); // 'upcoming' | 'live' | 'final'
    const played = m.score !== null && m.score !== undefined;
    let homeScore = '', awayScore = '', homeWin = false, awayWin = false;
    if (played) {
      const parts = String(m.score).split(/[-–]/).map(s => s.trim());
      if (parts.length === 2) {
        homeScore = parts[0];
        awayScore = parts[1];
        homeWin = Number(homeScore) > Number(awayScore);
        awayWin = Number(awayScore) > Number(homeScore);
      }
    }

    const leagueName = (leagues[m.league] && leagues[m.league].name) || m.league;

    let statusLabel, statusClass;
    if (status === 'live') {
      statusLabel = 'LIVE';
      statusClass = 'status-live';
    } else if (status === 'final') {
      statusLabel = 'FT';
      statusClass = 'status-final';
    } else {
      statusLabel = m._timeIsLocal ? 'kick-off' : (m._localTime ? 'venue time' : 'kick-off');
      statusClass = 'status-upcoming';
    }

    const homeRow = `
        <div class="team-row ${homeWin ? 'winner' : ''}">
          <span class="team-name">${m.home}</span>
          <span class="team-score">${homeScore}</span>
        </div>`;
    const awayRow = `
        <div class="team-row ${awayWin ? 'winner' : ''}">
          <span class="team-name">${m.away}</span>
          <span class="team-score">${awayScore}</span>
        </div>`;
    // AFLE/EFA display convention: away team's row on top, home team's row
    // on the bottom (see AWAY_FIRST_LEAGUES comment above).
    const teamRowsHtml = AWAY_FIRST_LEAGUES.has(m.league) ? (awayRow + homeRow) : (homeRow + awayRow);

    card.innerHTML = `
      <div class="match-time ${status === 'live' ? 'is-live' : ''}">
        ${m._localTime || 'TBC'}
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <div class="match-teams">
        <div class="league-tag">${leagueName}</div>
        ${teamRowsHtml}
        <div class="match-meta">
          ${m.venue ? m.venue : ''}${m.referee ? ' · Ref: ' + m.referee : ''}${m.attendance ? ' · Att: ' + Number(m.attendance).toLocaleString() : ''}
        </div>
      </div>
    `;
    matchList.appendChild(card);
  }
}

// Column order/labels for the standings table. Only columns where at
// least one row in the group actually has a value are rendered - which
// column shows up varies by sport/page (e.g. NRL's ladder has no "D"raw
// column worth showing since draws are rare/nonexistent in rugby league,
// while it does carry a bye count that parse_standings_table doesn't
// even capture, by design - see fetch_fixtures.py's STANDINGS_COLUMN_KEYWORDS).
const STANDINGS_COLUMNS = [
  { key: 'played', label: 'Pld' },
  { key: 'win', label: 'W' },
  { key: 'draw', label: 'D' },
  { key: 'loss', label: 'L' },
  { key: 'for', label: 'F' },
  { key: 'against', label: 'A' },
  { key: 'diff', label: '+/-' },
  { key: 'points', label: 'Pts' },
];

// A wiki-sourced highlight color is usually a pale tint (e.g. #E8FFD8 for
// "advances"), light enough to use directly as a full row background
// without needing to dim/lighten it further.
function renderStandingsTable(rows) {
  const activeCols = STANDINGS_COLUMNS.filter(c => rows.some(r => r[c.key] !== null && r[c.key] !== undefined));

  const headerCells = [
    '<th class="pos-col">#</th>',
    '<th class="team-col">Team</th>',
    ...activeCols.map(c => `<th>${c.label}</th>`),
  ].join('');

  const bodyRows = rows.map((r, i) => {
    const cells = activeCols.map(c => {
      const val = r[c.key];
      let cls = '';
      if (c.key === 'diff' && typeof val === 'number') {
        cls = val > 0 ? 'diff-positive' : (val < 0 ? 'diff-negative' : '');
      }
      const display = (val === null || val === undefined) ? '–' : (c.key === 'diff' && val > 0 ? '+' + val : val);
      return `<td class="${cls}">${display}</td>`;
    }).join('');
    const rowStyle = r.highlight ? ` style="background:${r.highlight}"` : '';
    return `<tr${rowStyle}><td class="pos-col">${i + 1}</td><td class="team-col">${r.team}</td>${cells}</tr>`;
  }).join('');

  return `<table class="standings-table"><thead><tr>${headerCells}</tr></thead><tbody>${bodyRows}</tbody></table>`;
}

// A standings group is stored as {rows, legend} now, but tolerate a plain
// array too (older cached fixtures.json from before this changed).
function groupRows(groupData) {
  return Array.isArray(groupData) ? groupData : (groupData.rows || []);
}
function groupLegend(groupData) {
  return Array.isArray(groupData) ? {} : (groupData.legend || {});
}

function renderLegend(legend) {
  const entries = Object.entries(legend || {});
  if (!entries.length) return '';
  const items = entries.map(([color, label]) =>
    `<span><span class="swatch" style="background:${color}"></span>${label}</span>`
  ).join('');
  return `<div class="standings-legend">${items}</div>`;
}

// Which round-path is selected per league, e.g. "Pre-Qualifiers · First
// Round", for leagues whose group labels carry that kind of breadcrumb
// (see fetch_phased_standings() in fetch_fixtures.py). Leagues with no
// such breadcrumb never populate/consult this.
const standingsRoundKey = {};
const BREADCRUMB_SEP = ' \u00b7 ';

function splitBreadcrumb(groupLabel) {
  const parts = groupLabel.split(BREADCRUMB_SEP);
  if (parts.length < 2) return { roundPath: null, group: groupLabel };
  return { roundPath: parts.slice(0, -1).join(BREADCRUMB_SEP), group: parts[parts.length - 1] };
}

function renderStandings() {
  standingsView.innerHTML = '';

  // Only leagues that actually have at least one non-empty standings
  // group are worth a pill - a league whose scrape failed/hasn't run
  // yet just doesn't show up here rather than showing an empty tab.
  const leagueKeys = Object.keys(standings).filter(
    key => Object.values(standings[key] || {}).some(g => groupRows(g).length)
  );

  if (leagueKeys.length === 0) {
    standingsView.innerHTML = '<div class="empty-state">No standings available yet.</div>';
    return;
  }

  // Keep whatever league is currently selected if it still has
  // standings; otherwise fall back to the Fixtures view's league filter
  // (if it names a real league); otherwise just the first available one.
  if (!standingsLeagueKey || !leagueKeys.includes(standingsLeagueKey)) {
    standingsLeagueKey = leagueKeys.includes(leagueSelect.value) ? leagueSelect.value : leagueKeys[0];
  }

  const row = document.createElement('div');
  row.className = 'league-scroller-row';

  const leftArrow = document.createElement('button');
  leftArrow.className = 'scroller-arrow';
  leftArrow.setAttribute('aria-label', 'Scroll leagues left');
  leftArrow.textContent = '\u2039';

  const scroller = document.createElement('div');
  scroller.className = 'league-scroller';
  for (const key of leagueKeys) {
    const btn = document.createElement('button');
    btn.className = 'league-pill' + (key === standingsLeagueKey ? ' active' : '');
    btn.textContent = (leagues[key] && leagues[key].name) || key;
    btn.addEventListener('click', () => {
      standingsLeagueKey = key;
      renderStandings();
    });
    scroller.appendChild(btn);
  }

  const rightArrow = document.createElement('button');
  rightArrow.className = 'scroller-arrow';
  rightArrow.setAttribute('aria-label', 'Scroll leagues right');
  rightArrow.textContent = '\u203a';

  const updateArrows = () => {
    leftArrow.disabled = scroller.scrollLeft <= 0;
    rightArrow.disabled = scroller.scrollLeft >= scroller.scrollWidth - scroller.clientWidth - 1;
  };
  leftArrow.addEventListener('click', () => scroller.scrollBy({ left: -160, behavior: 'smooth' }));
  rightArrow.addEventListener('click', () => scroller.scrollBy({ left: 160, behavior: 'smooth' }));
  scroller.addEventListener('scroll', updateArrows);

  row.appendChild(leftArrow);
  row.appendChild(scroller);
  row.appendChild(rightArrow);
  standingsView.appendChild(row);

  // Scroll the active pill into view (e.g. after the underlying league
  // list re-renders) so it's never hidden off-screen to the right.
  const activePill = scroller.querySelector('.league-pill.active');
  if (activePill && typeof activePill.scrollIntoView === 'function') {
    activePill.scrollIntoView({ block: 'nearest', inline: 'center' });
  }
  // Defer so layout has settled before measuring scrollWidth/clientWidth.
  setTimeout(updateArrows, 0);

  const leagueName = (leagues[standingsLeagueKey] && leagues[standingsLeagueKey].name) || standingsLeagueKey;
  const groups = standings[standingsLeagueKey] || {};

  // Leagues whose group labels are breadcrumbs ("Phase · Round · Group",
  // e.g. FIBA qualification) get a round-picker; everything else (a
  // league with no breadcrumb, e.g. Currie Cup's plain "Premier
  // Division") just lists its groups directly, as before.
  const roundPaths = [];
  for (const label of Object.keys(groups)) {
    const { roundPath } = splitBreadcrumb(label);
    if (roundPath && !roundPaths.includes(roundPath)) roundPaths.push(roundPath);
  }

  let visibleEntries = Object.entries(groups);

  if (roundPaths.length > 1) {
    if (!standingsRoundKey[standingsLeagueKey] || !roundPaths.includes(standingsRoundKey[standingsLeagueKey])) {
      standingsRoundKey[standingsLeagueKey] = roundPaths[0];
    }
    const picker = document.createElement('div');
    picker.className = 'round-picker';
    for (const path of roundPaths) {
      const btn = document.createElement('button');
      btn.className = 'round-pill' + (path === standingsRoundKey[standingsLeagueKey] ? ' active' : '');
      btn.textContent = path;
      btn.addEventListener('click', () => {
        standingsRoundKey[standingsLeagueKey] = path;
        renderStandings();
      });
      picker.appendChild(btn);
    }
    standingsView.appendChild(picker);

    visibleEntries = visibleEntries.filter(([label]) => {
      const { roundPath } = splitBreadcrumb(label);
      return roundPath === standingsRoundKey[standingsLeagueKey];
    });
  }

  for (const [groupLabel, groupData] of visibleEntries) {
    const rows = groupRows(groupData);
    if (!rows.length) continue;
    const { group: groupOnly } = splitBreadcrumb(groupLabel);
    const wrap = document.createElement('div');
    wrap.className = 'standings-group';
    // Only show the group label as its own heading when it's not just a
    // generic restatement of the league itself (e.g. skip a redundant
    // "Standings" sub-heading, but keep "West Division" / "Pool A" etc).
    const showGroupLabel = !/^(standings?|table|ladder)$/i.test(groupOnly.trim());
    wrap.innerHTML = `
      <h3>${leagueName}${showGroupLabel ? ' · ' + groupOnly : ''}</h3>
      ${renderStandingsTable(rows)}
      ${renderLegend(groupLegend(groupData))}
    `;
    standingsView.appendChild(wrap);
  }
}

// Neutral-venue games (e.g. the NRL/Super League "Vegas round") shouldn't
// count as a home game for whichever team is nominally listed as "home" -
// the whole point of those fixtures is that neither side is actually
// playing at home. Matched against m.venue by substring, case-insensitive.
const NEUTRAL_VENUES = ['Allegiant Stadium'];

// Same rationale as NEUTRAL_VENUES above, but keyed by exact match identity
// for one-off games that shouldn't count as a home game for the team
// nominally listed as "home", where the venue text itself isn't a reliable
// substring to match on - e.g. Hull KR's 3/1/26 game against Leeds Rhinos,
// which was actually played at a neutral site.
const EXCLUDED_HOME_MATCHES = new Set([
  'super-league-2026|2026-03-01|Hull KR|Leeds Rhinos',
]);

function isExcludedHomeMatch(m) {
  return EXCLUDED_HOME_MATCHES.has(`${m.league}|${m.date}|${m.home}|${m.away}`);
}

// Some source tables glue a footnote/marker onto an otherwise-normal team
// name - a leading "x-"/"y-"/"z-" clinched-status marker, a trailing "[a]"-
// style footnote reference, or a trailing "(H)"/"(A)" host/away designation
// on an international page. Left alone, these produce a second, garbled
// "team" that's really just the same club/nation, so every roster lookup
// normalizes through this first.
function normalizeTeamName(raw) {
  return String(raw)
    .replace(/^[xyz]\s*[-\u2013]\s*/i, '')
    .replace(/\s*\[[a-zA-Z0-9]{1,3}\]\s*$/, '')
    .replace(/\s*\((?:H|A)\)\s*$/i, '')
    .trim();
}

// Some competitions' schedules list a future/undetermined fixture with a
// placeholder team name (e.g. Super League's Grand Final qualifiers
// before they're known: "1st place" / "2nd place" / "3rd place" /
// "4th place") rather than a real club - these aren't teams and shouldn't
// get their own attendance row.
const PLACEHOLDER_TEAM_RE = /^(?:\d+(?:st|nd|rd|th)|first|second|third|fourth)\s+place$/i;

function isNeutralVenue(venue) {
  return !!venue && NEUTRAL_VENUES.some(v => venue.includes(v));
}

// Every team known to belong to a league, so a team that hasn't hosted a
// single (attendance-recorded) home game yet still gets its own row (shown
// with dashes) instead of being missing from the table entirely. Pulled
// from the league's standings (covers every team, whether or not they've
// played yet); if a league has no standings on record, falls back to every
// team seen as a home or away side in that league's matches.
function getLeagueRoster(leagueKey) {
  const names = new Set();
  const groups = standings[leagueKey] || {};
  for (const groupData of Object.values(groups)) {
    for (const r of groupRows(groupData)) {
      if (r.team) names.add(normalizeTeamName(r.team));
    }
  }
  if (names.size === 0) {
    for (const m of allMatches) {
      if (m.league !== leagueKey) continue;
      if (m.home && !PLACEHOLDER_TEAM_RE.test(m.home.trim())) names.add(normalizeTeamName(m.home));
      if (m.away && !PLACEHOLDER_TEAM_RE.test(m.away.trim())) names.add(normalizeTeamName(m.away));
    }
  }
  return Array.from(names);
}

// Per-team attendance stats for one league, built straight from allMatches
// (no separate scrape needed for most leagues - attendance already lives
// on each match). A match only counts toward a team's Home GP if it's been
// played AND has a recorded attendance figure - a played home game with no
// attendance on record yet does NOT add to Home GP (it isn't "played with
// unknown attendance", it just doesn't count until the figure shows up).
// Neutral-venue and placeholder-team rows are skipped entirely. Every team
// in the league's roster gets a row even with zero qualifying games, so it
// can be shown with dashes rather than disappearing from the table.
function computeAttendanceStats(leagueKey) {
  const stats = {};
  for (const m of allMatches) {
    if (m.league !== leagueKey || !m.home) continue;
    if (PLACEHOLDER_TEAM_RE.test(m.home.trim())) continue;
    if (isNeutralVenue(m.venue) || isExcludedHomeMatch(m)) continue;
    const played = m.score !== null && m.score !== undefined && m.score !== '';
    if (!played) continue;
    const homeTeam = normalizeTeamName(m.home);
    if (!stats[homeTeam]) {
      stats[homeTeam] = { team: homeTeam, withAttendance: 0, totalAttendance: 0 };
    }
    const s = stats[homeTeam];
    const att = Number(m.attendance);
    if (m.attendance !== null && m.attendance !== undefined && m.attendance !== '' && !Number.isNaN(att)) {
      s.withAttendance += 1;
      s.totalAttendance += att;
    }
  }
  for (const team of getLeagueRoster(leagueKey)) {
    if (!stats[team]) stats[team] = { team, withAttendance: 0, totalAttendance: 0 };
  }
  return Object.values(stats).map(s => ({
    team: s.team,
    homeGames: s.withAttendance,
    totalAttendance: s.totalAttendance,
    withAttendance: s.withAttendance,
    avgAttendance: s.withAttendance ? Math.round(s.totalAttendance / s.withAttendance) : null,
    noData: s.withAttendance === 0,
  }));
}

// Normalize an official scraped attendance table (see attendance_tables in
// fetch_fixtures.py - currently NRL/Super League's Wikipedia-maintained
// Games/Total/Average table) into the same row shape computeAttendanceStats()
// produces, so both sources can share one renderer.
function normalizeOfficialAttendanceRows(rows) {
  return rows.map(r => ({
    team: r.team,
    homeGames: r.games,
    totalAttendance: r.total || 0,
    withAttendance: r.total ? r.games : 0,
    avgAttendance: r.average !== null && r.average !== undefined ? r.average : null,
    noData: !r.total,
  }));
}

// Sort state for the Attendance table (shared across renders/leagues).
// key: 'team' | 'total' | 'avg'; dir: 'asc' | 'desc'.
let attendanceSort = { key: 'total', dir: 'desc' };

function sortAttendanceRows(rows, sort) {
  const arr = rows.slice();
  arr.sort((a, b) => {
    let av, bv;
    if (sort.key === 'team') {
      av = (a.team || '').toLowerCase();
      bv = (b.team || '').toLowerCase();
    } else if (sort.key === 'avg') {
      av = a.avgAttendance || 0;
      bv = b.avgAttendance || 0;
    } else {
      av = a.totalAttendance || 0;
      bv = b.totalAttendance || 0;
    }
    if (av < bv) return sort.dir === 'asc' ? -1 : 1;
    if (av > bv) return sort.dir === 'asc' ? 1 : -1;
    return 0;
  });
  return arr;
}

function renderAttendanceTable(rows) {
  const sorted = sortAttendanceRows(rows, attendanceSort);

  // Bottom "Total" row: total home games (GP) and total attendance summed
  // across every team, with the average recomputed from those totals -
  // not an average of each team's own average.
  const totalGames = rows.reduce((sum, r) => sum + (r.withAttendance || 0), 0);
  const totalAtt = rows.reduce((sum, r) => sum + (r.totalAttendance || 0), 0);
  const totalAvg = totalGames ? Math.round(totalAtt / totalGames) : null;

  const bodyRows = sorted.map(r => {
    if (r.noData) {
      return `<tr>
        <td class="team-col">${r.team}</td>
        <td class="dash-cell">\u2013</td>
        <td class="dash-cell total-att-clickable" data-team="${escapeHtml(r.team)}">\u2013</td>
        <td class="dash-cell">\u2013</td>
      </tr>`;
    }
    return `<tr>
      <td class="team-col">${r.team}</td>
      <td>${r.homeGames}</td>
      <td class="total-att-clickable" data-team="${escapeHtml(r.team)}">${r.totalAttendance.toLocaleString()}</td>
      <td>${r.avgAttendance.toLocaleString()}</td>
    </tr>`;
  }).join('');

  const totalRow = `<tr class="attendance-total-row">
    <td class="team-col">Total</td>
    <td>${totalGames.toLocaleString()}</td>
    <td>${totalAtt.toLocaleString()}</td>
    <td>${totalAvg !== null ? totalAvg.toLocaleString() : '\u2013'}</td>
  </tr>`;

  const arrow = (key) => attendanceSort.key === key ? (attendanceSort.dir === 'asc' ? ' \u2191' : ' \u2193') : '';

  return `<table class="standings-table"><thead><tr>
    <th class="team-col sortable" data-sort="team">Team${arrow('team')}</th>
    <th>Home&nbsp;GP</th>
    <th class="sortable" data-sort="total">Total&nbsp;Att.${arrow('total')}</th>
    <th class="sortable" data-sort="avg">Avg&nbsp;Att.${arrow('avg')}</th>
  </tr></thead><tbody>${bodyRows}${totalRow}</tbody></table>`;
}

// Wires up the sortable column headers and the clickable Avg Att. cells
// inside a freshly-rendered attendance table container.
function attachAttendanceTableHandlers(container, leagueKey) {
  container.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (attendanceSort.key === key) {
        attendanceSort.dir = attendanceSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        attendanceSort.key = key;
        attendanceSort.dir = key === 'team' ? 'asc' : 'desc';
      }
      renderAttendance();
    });
  });
  container.querySelectorAll('.total-att-clickable').forEach(td => {
    td.addEventListener('click', () => showTeamGamesModal(leagueKey, td.dataset.team));
  });
}

function renderAttendance() {
  attendanceView.innerHTML = '';

  // A league qualifies for a pill if it either has an official scraped
  // attendance table, or at least one played home match with a recorded
  // attendance figure - same "don't show an empty tab" rule as Standings.
  const leagueKeys = Object.keys(leagues).filter(key => {
    if ((attendanceTables[key] || []).length) return true;
    return computeAttendanceStats(key).some(r => r.withAttendance > 0);
  });

  if (leagueKeys.length === 0) {
    attendanceView.innerHTML = '<div class="empty-state">No attendance data available yet.</div>';
    return;
  }

  if (!attendanceLeagueKey || !leagueKeys.includes(attendanceLeagueKey)) {
    attendanceLeagueKey = leagueKeys.includes(leagueSelect.value) ? leagueSelect.value : leagueKeys[0];
  }

  const row = document.createElement('div');
  row.className = 'league-scroller-row';

  const leftArrow = document.createElement('button');
  leftArrow.className = 'scroller-arrow';
  leftArrow.setAttribute('aria-label', 'Scroll leagues left');
  leftArrow.textContent = '\u2039';

  const scroller = document.createElement('div');
  scroller.className = 'league-scroller';
  for (const key of leagueKeys) {
    const btn = document.createElement('button');
    btn.className = 'league-pill' + (key === attendanceLeagueKey ? ' active' : '');
    btn.textContent = (leagues[key] && leagues[key].name) || key;
    btn.addEventListener('click', () => {
      attendanceLeagueKey = key;
      renderAttendance();
    });
    scroller.appendChild(btn);
  }

  const rightArrow = document.createElement('button');
  rightArrow.className = 'scroller-arrow';
  rightArrow.setAttribute('aria-label', 'Scroll leagues right');
  rightArrow.textContent = '\u203a';

  const updateArrows = () => {
    leftArrow.disabled = scroller.scrollLeft <= 0;
    rightArrow.disabled = scroller.scrollLeft >= scroller.scrollWidth - scroller.clientWidth - 1;
  };
  leftArrow.addEventListener('click', () => scroller.scrollBy({ left: -160, behavior: 'smooth' }));
  rightArrow.addEventListener('click', () => scroller.scrollBy({ left: 160, behavior: 'smooth' }));
  scroller.addEventListener('scroll', updateArrows);

  row.appendChild(leftArrow);
  row.appendChild(scroller);
  row.appendChild(rightArrow);
  attendanceView.appendChild(row);

  const activePill = scroller.querySelector('.league-pill.active');
  if (activePill && typeof activePill.scrollIntoView === 'function') {
    activePill.scrollIntoView({ block: 'nearest', inline: 'center' });
  }
  setTimeout(updateArrows, 0);

  const leagueName = (leagues[attendanceLeagueKey] && leagues[attendanceLeagueKey].name) || attendanceLeagueKey;
  const officialRows = attendanceTables[attendanceLeagueKey];
  const rows = (officialRows && officialRows.length)
    ? normalizeOfficialAttendanceRows(officialRows)
    : computeAttendanceStats(attendanceLeagueKey);

  const wrap = document.createElement('div');
  wrap.className = 'standings-group';
  wrap.innerHTML = `
    <h3>${leagueName} \u00b7 Attendance</h3>
    ${renderAttendanceTable(rows)}
  `;
  attendanceView.appendChild(wrap);
  attachAttendanceTableHandlers(wrap, attendanceLeagueKey);
}

function populateLeagueOptions() {
  for (const [key, info] of Object.entries(leagues)) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = info.name || key;
    leagueSelect.appendChild(opt);
  }
}

function pickInitialDate() {
  const today = toISODate(new Date());
  if (allMatches.some(m => m._localDate === today)) return today;
  const upcoming = allMatches
    .map(m => m._localDate)
    .filter(d => d && d >= today)
    .sort();
  if (upcoming.length) return upcoming[0];
  const anyDates = allMatches.map(m => m._localDate).filter(Boolean).sort();
  return anyDates.length ? anyDates[anyDates.length - 1] : today;
}

function loadFixtures(isRefresh) {
  return fetch('fixtures.json?t=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('fixtures.json not found - run fetch_fixtures.py first');
      return r.json();
    })
    .then(data => {
      allMatches = (data.matches || []).map(enrichMatch);
      leagues = data.leagues || {};
      standings = data.standings || {};
      attendanceTables = data.attendance_tables || {};
      if (!isRefresh) {
        populateLeagueOptions();
        dateInput.value = pickInitialDate();
      }
      updateNote.textContent = data.updated
        ? 'Fixtures last updated ' + new Date(data.updated).toLocaleString() + ' · times shown in your local timezone'
        : 'Times shown in your local timezone';
      render();
    })
    .catch(err => {
      updateNote.textContent = 'Could not load fixtures.json';
      matchList.innerHTML = `<div class="empty-state">${err.message}<br><br>
        Serve this folder with <code>python3 -m http.server</code> and open it via
        <code>http://localhost:8000/matches.html</code> (opening the file directly
        won't work due to browser CORS rules).</div>`;
    });
}

loadFixtures(false);

// Re-render every 30s so a match crossing into/out of its LIVE window
// updates on screen without the user touching anything.
setInterval(render, 30 * 1000);

// Re-fetch fixtures.json every 5 min to pick up new scores/kickoffs written
// by the fetch_fixtures.py pipeline, without a full page reload.
setInterval(() => loadFixtures(true), 5 * 60 * 1000);
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Day</title>
<style>
  :root {
    --navy: #0b1f3a;
    --navy-light: #12335e;
    --red: #c8102e;
    --red-dark: #9c0c22;
    --paper: #f4f5f7;
    --grey: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--paper);
    color: var(--navy);
  }
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    color: white;
    padding: 24px 20px 20px;
    border-bottom: 4px solid var(--red);
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    letter-spacing: 0.3px;
  }
  header p {
    margin: 0;
    font-size: 13px;
    color: #b9c4d8;
  }
  .controls {
    max-width: 720px;
    margin: -22px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .control-card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 14px rgba(11,31,58,0.15);
    padding: 12px 14px;
    flex: 1;
    min-width: 160px;
  }
  .control-card label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--grey);
    margin-bottom: 4px;
  }
  .control-card input,
  .control-card select {
    width: 100%;
    border: none;
    font-size: 15px;
    font-weight: 600;
    color: var(--navy);
    outline: none;
    font-family: inherit;
  }
  .day-nav {
    max-width: 720px;
    margin: 14px auto 0;
    padding: 0 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .day-nav button {
    border: none;
    background: white;
    color: var(--navy);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(11,31,58,0.12);
  }
  .day-nav button:hover { background: var(--navy); color: white; }
  .view-tabs {
    max-width: 720px;
    margin: 14px auto 0;
    padding: 0 20px;
    display: flex;
    justify-content: center;
    gap: 8px;
  }
  .view-tabs button {
    border: none;
    background: transparent;
    color: var(--grey);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .view-tabs button.active {
    background: var(--navy);
    color: white;
  }
  .league-bar {
    max-width: 720px;
    margin: 14px auto 0;
    padding: 0 20px 4px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .league-bar::-webkit-scrollbar { display: none; }
  .league-bar button {
    flex: 0 0 auto;
    border: none;
    background: white;
    color: var(--navy);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(11,31,58,0.12);
    white-space: nowrap;
  }
  .league-bar button.active {
    background: var(--navy);
    color: white;
  }
  .standings-group {
    margin-bottom: 22px;
  }
  .standings-group h2 {
    font-size: 14px;
    margin: 0 0 8px;
    color: var(--navy);
  }
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(11,31,58,0.08);
    font-size: 13px;
  }
  .standings-table th,
  .standings-table td {
    padding: 8px 10px;
    text-align: center;
  }
  .standings-table th {
    background: var(--navy);
    color: white;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .standings-table td.team-col,
  .standings-table th.team-col {
    text-align: left;
  }
  .standings-table tr:nth-child(even) td {
    background: #f8f9fb;
  }
  .standings-table td.pts-col {
    font-weight: 700;
    color: var(--navy);
  }
  .bracket-group {
    margin-bottom: 28px;
  }
  .bracket-group h2 {
    font-size: 14px;
    margin: 0 0 10px;
    color: var(--navy);
  }
  .bracket-rounds {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .bracket-round {
    flex: 0 0 200px;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    gap: 10px;
  }
  .bracket-round h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--grey);
    margin: 0 0 2px;
    text-align: center;
  }
  .bracket-match {
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(11,31,58,0.1);
    padding: 8px 10px;
    font-size: 13px;
  }
  .bracket-row {
    display: flex;
    justify-content: space-between;
    padding: 3px 0;
  }
  .bracket-row.winner { font-weight: 700; color: var(--navy); }
  .bracket-team { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bracket-score { padding-left: 8px; font-weight: 700; }
  .bracket-date {
    font-size: 10px;
    color: var(--grey);
    text-align: center;
    margin-top: 4px;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
  }
  .selected-date {
    text-align: center;
    font-size: 14px;
    color: var(--grey);
    margin-bottom: 16px;
  }
  .match-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(11,31,58,0.08);
    padding: 14px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .match-time {
    width: 56px;
    flex-shrink: 0;
    text-align: center;
    font-weight: 700;
    color: var(--red);
    font-size: 14px;
  }
  .match-time span {
    display: block;
    font-size: 10px;
    color: var(--grey);
    font-weight: 500;
  }
  .match-teams {
    flex: 1;
    min-width: 0;
  }
  .team-row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
    font-size: 15px;
  }
  .team-row.winner { font-weight: 700; }
  .team-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .team-score { font-weight: 700; color: var(--navy); padding-left: 10px; }
  .match-meta {
    font-size: 12px;
    color: var(--grey);
    margin-top: 6px;
  }
  .league-tag {
    display: inline-block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    background: var(--navy);
    color: white;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 4px;
  }
  .empty-state {
    text-align: center;
    color: var(--grey);
    padding: 40px 20px;
    font-size: 14px;
  }
  .status-badge {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 4px;
  }
  .status-upcoming { background: #e8edf5; color: var(--navy); }
  .status-final { background: #fdeceb; color: var(--red-dark); }
  .status-live {
    background: var(--red);
    color: white;
    animation: live-pulse 1.6s ease-in-out infinite;
  }
  @keyframes live-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .match-time.is-live { color: var(--red); }
</style>
</head>
<body>

<header>
  <h1>Match Day</h1>
  <p id="update-note">Loading fixtures…</p>
</header>

<div class="controls">
  <div class="control-card">
    <label for="date-input">Date</label>
    <input type="date" id="date-input">
  </div>
  <div class="control-card">
    <label for="league-select">League</label>
    <select id="league-select">
      <option value="all">All leagues</option>
    </select>
  </div>
</div>

<div class="view-tabs">
  <button id="tab-fixtures" class="active">Fixtures</button>
  <button id="tab-standings">Standings</button>
  <button id="tab-bracket">Bracket</button>
</div>

<div class="day-nav" id="day-nav">
  <button id="prev-day">&larr; Prev</button>
  <button id="today-btn">Today</button>
  <button id="next-day">Next &rarr;</button>
</div>

<div class="league-bar" id="league-bar" style="display:none"></div>

<main>
  <div class="selected-date" id="selected-date-label"></div>
  <div id="match-list"></div>
  <div id="standings-view" style="display:none"></div>
  <div id="bracket-view" style="display:none"></div>
</main>

<script>
let allMatches = [];
let leagues = {};
let allStandings = {};
let currentView = 'fixtures';

// Standings and Bracket each get their own "which league is selected"
// state, independent of the Fixtures date view's dropdown and of each
// other, so switching tabs doesn't reset your place. null means "not
// chosen yet" - populateLeagueBar() defaults it to the first league with
// data the first time that view is opened.
let standingsLeague = null;
let bracketLeague = null;

const dateInput = document.getElementById('date-input');
const leagueSelect = document.getElementById('league-select');
const controls = document.querySelector('.controls');
const matchList = document.getElementById('match-list');
const standingsView = document.getElementById('standings-view');
const bracketView = document.getElementById('bracket-view');
const dayNav = document.getElementById('day-nav');
const leagueBar = document.getElementById('league-bar');
const tabFixtures = document.getElementById('tab-fixtures');
const tabStandings = document.getElementById('tab-standings');
const tabBracket = document.getElementById('tab-bracket');
const selectedDateLabel = document.getElementById('selected-date-label');
const updateNote = document.getElementById('update-note');

function toISODate(d) {
  return d.toISOString().slice(0, 10);
}

function shiftDate(days) {
  const current = new Date(dateInput.value + 'T00:00:00');
  current.setDate(current.getDate() + days);
  dateInput.value = toISODate(current);
  render();
}

document.getElementById('prev-day').addEventListener('click', () => shiftDate(-1));
document.getElementById('next-day').addEventListener('click', () => shiftDate(1));
document.getElementById('today-btn').addEventListener('click', () => {
  dateInput.value = toISODate(new Date());
  render();
});
dateInput.addEventListener('change', render);
leagueSelect.addEventListener('change', render);

tabFixtures.addEventListener('click', () => setView('fixtures'));
tabStandings.addEventListener('click', () => setView('standings'));
tabBracket.addEventListener('click', () => setView('bracket'));

function setView(view) {
  currentView = view;
  tabFixtures.classList.toggle('active', view === 'fixtures');
  tabStandings.classList.toggle('active', view === 'standings');
  tabBracket.classList.toggle('active', view === 'bracket');
  const isFixtures = view === 'fixtures';
  // Fixtures keeps the Date/League dropdown card (it's a day-by-day, all-
  // or-one-league view). Standings and Bracket are each their own
  // distinct page keyed off a single league, chosen from the horizontal
  // league bar instead - so the dropdown card is irrelevant there.
  controls.style.display = isFixtures ? 'flex' : 'none';
  dayNav.style.display = isFixtures ? 'flex' : 'none';
  selectedDateLabel.style.display = isFixtures ? '' : 'none';
  matchList.style.display = isFixtures ? '' : 'none';
  leagueBar.style.display = isFixtures ? 'none' : 'flex';
  standingsView.style.display = view === 'standings' ? '' : 'none';
  bracketView.style.display = view === 'bracket' ? '' : 'none';
  render();
}

function enrichMatch(m) {
  // Prefer the true UTC instant (converted to whatever timezone this
  // browser is in) over the raw venue-local date/time that came straight
  // off the Wikipedia page. Falls back to the venue-local values (and
  // flags them as such) when we don't have enough info to compute UTC -
  // e.g. the kickoff time wasn't parseable, or the league has no known
  // UTC offset for that venue.
  if (m.utc) {
    const d = new Date(m.utc);
    m._localDate = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    m._localTime = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    m._timeIsLocal = true;
  } else {
    m._localDate = m.date;
    m._localTime = m.time;
    m._timeIsLocal = false;
  }
  return m;
}

// How long after kickoff a match is still considered "live" for display
// purposes. This is just a display heuristic - fixtures.json doesn't carry
// a real live/final signal (Wikipedia only gives us date/time/score), so a
// match still shows LIVE for up to this long after its scheduled kickoff
// even if it actually finished early, and flips to FT/upcoming outside
// this window based on whether a score has been parsed.
const LIVE_WINDOW_MS = 2 * 60 * 60 * 1000; // 2 hours

function getMatchStatus(m, now) {
  // No usable kickoff instant - fall back to score-only logic (old behavior)
  if (!m.utc) {
    return (m.score !== null && m.score !== undefined) ? 'final' : 'upcoming';
  }
  const start = new Date(m.utc);
  const elapsed = now - start;
  if (elapsed < 0) return 'upcoming';
  if (elapsed <= LIVE_WINDOW_MS) return 'live';
  return (m.score !== null && m.score !== undefined) ? 'final' : 'upcoming';
}

function formatDateLabel(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function render() {
  if (currentView === 'standings') {
    populateLeagueBar('standings');
    renderStandings();
    return;
  }
  if (currentView === 'bracket') {
    populateLeagueBar('bracket');
    renderBracket();
    return;
  }

  const selectedDate = dateInput.value;
  const selectedLeague = leagueSelect.value;

  selectedDateLabel.textContent = selectedDate ? formatDateLabel(selectedDate) : '';

  const dayMatches = allMatches
    .filter(m => m._localDate === selectedDate)
    .filter(m => selectedLeague === 'all' || m.league === selectedLeague)
    .sort((a, b) => (a._localTime || '99:99').localeCompare(b._localTime || '99:99'));

  matchList.innerHTML = '';

  if (dayMatches.length === 0) {
    matchList.innerHTML = '<div class="empty-state">No matches scheduled for this day.</div>';
    return;
  }

  const now = new Date();

  for (const m of dayMatches) {
    const card = document.createElement('div');
    card.className = 'match-card';

    const status = getMatchStatus(m, now); // 'upcoming' | 'live' | 'final'
    const played = m.score !== null && m.score !== undefined;
    let homeScore = '', awayScore = '', homeWin = false, awayWin = false;
    if (played) {
      const parts = String(m.score).split(/[-–]/).map(s => s.trim());
      if (parts.length === 2) {
        homeScore = parts[0];
        awayScore = parts[1];
        homeWin = Number(homeScore) > Number(awayScore);
        awayWin = Number(awayScore) > Number(homeScore);
      }
    }

    const leagueName = (leagues[m.league] && leagues[m.league].name) || m.league;

    let statusLabel, statusClass;
    if (status === 'live') {
      statusLabel = 'LIVE';
      statusClass = 'status-live';
    } else if (status === 'final') {
      statusLabel = 'FT';
      statusClass = 'status-final';
    } else {
      statusLabel = m._timeIsLocal ? 'kick-off' : (m._localTime ? 'venue time' : 'kick-off');
      statusClass = 'status-upcoming';
    }

    card.innerHTML = `
      <div class="match-time ${status === 'live' ? 'is-live' : ''}">
        ${m._localTime || 'TBC'}
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <div class="match-teams">
        <div class="league-tag">${leagueName}</div>
        <div class="team-row ${homeWin ? 'winner' : ''}">
          <span class="team-name">${m.home}</span>
          <span class="team-score">${homeScore}</span>
        </div>
        <div class="team-row ${awayWin ? 'winner' : ''}">
          <span class="team-name">${m.away}</span>
          <span class="team-score">${awayScore}</span>
        </div>
        <div class="match-meta">
          ${m.venue ? m.venue : ''}${m.attendance ? ' · Att: ' + Number(m.attendance).toLocaleString() : ''}
        </div>
      </div>
    `;
    matchList.appendChild(card);
  }
}

function populateLeagueOptions() {
  for (const [key, info] of Object.entries(leagues)) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = info.name || key;
    leagueSelect.appendChild(opt);
  }
}

// Builds the horizontal, scrollable "which league" chip bar for the
// Standings/Bracket pages - the ESPN-style picker where each league gets
// its own button rather than a dropdown. Only lists leagues that actually
// have data for the view in question, plus a leading "All leagues" chip.
function populateLeagueBar(view) {
  const keysWithData = view === 'standings'
    ? Object.keys(allStandings)
    : [...new Set(
        allMatches
          .filter(m => m.group && /bracket/i.test(m.group))
          .map(m => m.league)
      )];

  leagueBar.innerHTML = '';

  if (keysWithData.length === 0) {
    leagueBar.style.display = 'none';
    return;
  }
  leagueBar.style.display = 'flex';

  const ordered = ['all', ...keysWithData.sort((a, b) =>
    ((leagues[a] && leagues[a].name) || a).localeCompare((leagues[b] && leagues[b].name) || b)
  )];

  let current = view === 'standings' ? standingsLeague : bracketLeague;
  if (!current || !ordered.includes(current)) {
    // Default to the first real league rather than "All leagues", so
    // opening Standings/Bracket for the first time lands on a single,
    // readable page instead of everything at once.
    current = ordered[1] || ordered[0];
  }
  if (view === 'standings') standingsLeague = current; else bracketLeague = current;

  for (const key of ordered) {
    const btn = document.createElement('button');
    btn.textContent = key === 'all' ? 'All leagues' : ((leagues[key] && leagues[key].name) || key);
    btn.className = key === current ? 'active' : '';
    btn.addEventListener('click', () => {
      if (view === 'standings') standingsLeague = key; else bracketLeague = key;
      render();
    });
    leagueBar.appendChild(btn);
  }
}

// Column order/labels for the standings table. Any column with no data at
// all across every row in a group is skipped, since not every sport/table
// fills in every stat (e.g. rugby groups have no "for/against" split the
// same way basketball ones do).
const STANDINGS_COLUMNS = [
  { key: 'played', label: 'Pld' },
  { key: 'win', label: 'W' },
  { key: 'draw', label: 'D' },
  { key: 'loss', label: 'L' },
  { key: 'for', label: 'F' },
  { key: 'against', label: 'A' },
  { key: 'diff', label: '+/-' },
  { key: 'points', label: 'Pts', cssClass: 'pts-col' },
];

function renderStandings() {
  standingsView.innerHTML = '';

  const selectedLeague = standingsLeague || 'all';
  const leagueKeys = selectedLeague === 'all' ? Object.keys(allStandings) : [selectedLeague];
  const groupsToShow = [];

  for (const key of leagueKeys) {
    const groups = allStandings[key];
    if (!groups) continue;
    const leagueName = (leagues[key] && leagues[key].name) || key;
    for (const [groupLabel, rows] of Object.entries(groups)) {
      groupsToShow.push({ leagueName, groupLabel, rows });
    }
  }

  if (groupsToShow.length === 0) {
    standingsView.innerHTML = '<div class="empty-state">No standings available for this league yet.</div>';
    return;
  }

  for (const { leagueName, groupLabel, rows } of groupsToShow) {
    const activeColumns = STANDINGS_COLUMNS.filter(col =>
      rows.some(r => r[col.key] !== null && r[col.key] !== undefined)
    );

    const section = document.createElement('div');
    section.className = 'standings-group';

    const heading = selectedLeague === 'all'
      ? `${leagueName} &middot; ${groupLabel}`
      : (groupLabel === 'Standings' || groupLabel === leagueName ? leagueName : `${leagueName} &middot; ${groupLabel}`);

    section.innerHTML = `
      <h2>${heading}</h2>
      <table class="standings-table">
        <thead>
          <tr>
            <th class="team-col">Team</th>
            ${activeColumns.map(c => `<th class="${c.cssClass || ''}">${c.label}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td class="team-col">${r.team}</td>
              ${activeColumns.map(c => `<td class="${c.cssClass || ''}">${r[c.key] ?? ''}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    standingsView.appendChild(section);
  }
}

// Rough placement ranking so bracket groups display in a sensible order
// (Championship first, then descending by placement) without hardcoding
// exact bracket names - these are the ordinal words Wikipedia's knockout
// bracket headings use ("Fifth-place bracket", "Thirteenth-place bracket",
// etc.), not digits, so they're matched by word rather than regex \d+.
const BRACKET_ORDINAL_RANK = {
  championship: 0, final: 0,
  first: 1, third: 3, fifth: 5, seventh: 7, ninth: 9,
  eleventh: 11, thirteenth: 13, fifteenth: 15, seventeenth: 17,
};

function bracketRank(groupName) {
  const g = groupName.toLowerCase();
  for (const [word, rank] of Object.entries(BRACKET_ORDINAL_RANK)) {
    if (g.includes(word)) return rank;
  }
  return 999;
}

function earliestSortKey(matches) {
  return matches.reduce((min, m) => {
    const key = (m._localDate || m.date || '9999-99-99') + 'T' + (m._localTime || m.time || '99:99');
    return (min === null || key < min) ? key : min;
  }, null) || '';
}

function groupRounds(matches) {
  const byRound = new Map();
  for (const m of matches) {
    const r = m.round || 'Match';
    if (!byRound.has(r)) byRound.set(r, []);
    byRound.get(r).push(m);
  }
  return [...byRound.entries()]
    .map(([round, ms]) => ({
      round,
      matches: ms.slice().sort((a, b) => earliestSortKey([a]).localeCompare(earliestSortKey([b]))),
    }))
    .sort((a, b) => earliestSortKey(a.matches).localeCompare(earliestSortKey(b.matches)));
}

function bracketMatchCard(m) {
  const played = m.score !== null && m.score !== undefined && m.score !== '';
  let homeScore = '', awayScore = '', homeWin = false, awayWin = false;
  if (played) {
    const parts = String(m.score).split(/[-–]/).map(s => s.trim());
    if (parts.length === 2) {
      homeScore = parts[0];
      awayScore = parts[1];
      homeWin = Number(homeScore) > Number(awayScore);
      awayWin = Number(awayScore) > Number(homeScore);
    }
  }
  return `
    <div class="bracket-match">
      <div class="bracket-row ${homeWin ? 'winner' : ''}">
        <span class="bracket-team">${m.home}</span>
        <span class="bracket-score">${homeScore}</span>
      </div>
      <div class="bracket-row ${awayWin ? 'winner' : ''}">
        <span class="bracket-team">${m.away}</span>
        <span class="bracket-score">${awayScore}</span>
      </div>
      <div class="bracket-date">${m._localDate || m.date || 'TBC'}</div>
    </div>
  `;
}

function renderBracket() {
  bracketView.innerHTML = '';

  const selectedLeague = bracketLeague || 'all';
  const candidates = allMatches.filter(m =>
    m.group && /bracket/i.test(m.group) &&
    (selectedLeague === 'all' || m.league === selectedLeague)
  );

  if (candidates.length === 0) {
    bracketView.innerHTML = '<div class="empty-state">No bracket data available for this league yet.</div>';
    return;
  }

  const byGroup = new Map();
  for (const m of candidates) {
    const key = m.league + '||' + m.group;
    if (!byGroup.has(key)) byGroup.set(key, { league: m.league, group: m.group, matches: [] });
    byGroup.get(key).matches.push(m);
  }

  const groups = [...byGroup.values()].sort((a, b) => bracketRank(a.group) - bracketRank(b.group));

  for (const { league, group, matches } of groups) {
    const leagueName = (leagues[league] && leagues[league].name) || league;
    const rounds = groupRounds(matches);

    const section = document.createElement('div');
    section.className = 'bracket-group';
    section.innerHTML = `
      <h2>${selectedLeague === 'all' ? leagueName + ' &middot; ' : ''}${group}</h2>
      <div class="bracket-rounds">
        ${rounds.map(r => `
          <div class="bracket-round">
            <h3>${r.round}</h3>
            ${r.matches.map(bracketMatchCard).join('')}
          </div>
        `).join('')}
      </div>
    `;
    bracketView.appendChild(section);
  }
}

function pickInitialDate() {
  const today = toISODate(new Date());
  if (allMatches.some(m => m._localDate === today)) return today;
  const upcoming = allMatches
    .map(m => m._localDate)
    .filter(d => d && d >= today)
    .sort();
  if (upcoming.length) return upcoming[0];
  const anyDates = allMatches.map(m => m._localDate).filter(Boolean).sort();
  return anyDates.length ? anyDates[anyDates.length - 1] : today;
}

function loadFixtures(isRefresh) {
  return fetch('fixtures.json?t=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error('fixtures.json not found - run fetch_fixtures.py first');
      return r.json();
    })
    .then(data => {
      allMatches = (data.matches || []).map(enrichMatch);
      leagues = data.leagues || {};
      allStandings = data.standings || {};
      if (!isRefresh) {
        populateLeagueOptions();
        dateInput.value = pickInitialDate();
      }
      updateNote.textContent = data.updated
        ? 'Fixtures last updated ' + new Date(data.updated).toLocaleString() + ' · times shown in your local timezone'
        : 'Times shown in your local timezone';
      render();
    })
    .catch(err => {
      updateNote.textContent = 'Could not load fixtures.json';
      matchList.innerHTML = `<div class="empty-state">${err.message}<br><br>
        Serve this folder with <code>python3 -m http.server</code> and open it via
        <code>http://localhost:8000/matches.html</code> (opening the file directly
        won't work due to browser CORS rules).</div>`;
    });
}

loadFixtures(false);

// Re-render every 30s so a match crossing into/out of its LIVE window
// updates on screen without the user touching anything.
setInterval(render, 30 * 1000);

// Re-fetch fixtures.json every 5 min to pick up new scores/kickoffs written
// by the fetch_fixtures.py pipeline, without a full page reload.
setInterval(() => loadFixtures(true), 5 * 60 * 1000);
</script>
